<!doctype html>
<html lang="en">
  <body style="margin:0;background:#171717;font-family:Arial,Helvetica,sans-serif;color:#f4f1e8;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#171717;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#222222;border:1px solid #3d3524;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:32px;">
                <div style="font-size:13px;letter-spacing:3px;color:#d3a84b;font-weight:700;">BDB OS</div>
                <h1 style="margin:22px 0 12px;font-size:28px;line-height:1.25;color:#ffffff;">Continue to your business account.</h1>
                <p style="margin:0 0 18px;color:#c9c5bb;font-size:16px;line-height:1.65;">
                  A fresh secure access link has been requested for your BDB OS account.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:28px 0;">
                  <tr>
                    <td style="border-radius:10px;background:#d3a84b;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;color:#171717;text-decoration:none;font-size:15px;font-weight:700;">Open BDB OS securely</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;color:#908b80;font-size:13px;line-height:1.6;">
                  This link can only be used once and expires shortly. If you did not request it, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
