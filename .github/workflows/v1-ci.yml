name: BDB OS V1 Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee npm-ci.log

      - name: Upload install diagnostics
        if: steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-diagnostics
          path: npm-ci.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after install failure
        if: steps.install.outcome == 'failure'
        run: exit 1

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
