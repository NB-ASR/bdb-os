name: BDB OS V1 Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bdb-v1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          show-progress: false

      - name: Verify repository contracts
        shell: bash
        run: |
          test -f package.json
          test -f package-lock.json
          test -d supabase/migrations
          test -d supabase/tests
          node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('Dependency lockfile is valid JSON')"
          duplicates="$(find supabase/migrations -maxdepth 1 -type f -printf '%f\n' | sort | uniq -d)"
          test -z "$duplicates" || { echo "Duplicate migration filenames: $duplicates"; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: TypeScript
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typescript-diagnostics.log

      - name: Upload TypeScript diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: typescript-diagnostics.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Unit and database contract tests
        run: npm test

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

  database-migrations:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          show-progress: false

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
          github-token: ${{ github.token }}

      - name: Start disposable local database and replay migrations
        shell: bash
        run: |
          set -o pipefail
          supabase db start 2>&1 | tee database-migration-diagnostics.log

      - name: Upload database migration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-migration-diagnostics
          path: database-migration-diagnostics.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Run pgTAP database security tests
        run: supabase test db

      - name: Destroy disposable local database
        if: always()
        run: supabase stop --no-backup

  public-browser:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install application dependencies
        run: npm ci

      - name: Install browser test runner without changing the lockfile
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Start application
        shell: bash
        run: |
          npm start > /tmp/bdb-os.log 2>&1 &
          echo $! > /tmp/bdb-os.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/bdb-os.log
          exit 1

      - name: Public browser journeys
        env:
          BDB_E2E_BASE_URL: http://127.0.0.1:3000
        run: npx playwright test tests/e2e/public-access.spec.ts --project=chromium

      - name: Upload browser report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: public-browser-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

  authenticated-browser:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [validate, database-migrations]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install application dependencies
        run: npm ci

      - name: Install browser test runner without changing the lockfile
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Authenticated owner journeys
        env:
          BDB_E2E_BASE_URL: ${{ secrets.BDB_E2E_BASE_URL }}
          BDB_E2E_OWNER_EMAIL: ${{ secrets.BDB_E2E_OWNER_EMAIL }}
          BDB_E2E_OWNER_PASSWORD: ${{ secrets.BDB_E2E_OWNER_PASSWORD }}
          BDB_E2E_WORKSPACE_NAME: ${{ secrets.BDB_E2E_WORKSPACE_NAME }}
        run: npx playwright test tests/e2e/authenticated-core.spec.ts --project=chromium

  launch-hardening-patch:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'qa/launch-readiness-hardening-v1' && github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out launch branch
        uses: actions/checkout@v4
        with:
          ref: qa/launch-readiness-hardening-v1
          fetch-depth: 0

      - name: Apply final source patches and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          app_path = Path("projects/vanita-stock/app.js")
          app = app_path.read_text()

          old_id = 'const makeId = (prefix) => `${prefix}-${String(Date.now()).slice(-5)}`;'
          new_id = '''const makeId = (prefix) => {
            const token = globalThis.crypto?.randomUUID
              ? globalThis.crypto.randomUUID().split("-")[0].toUpperCase()
              : `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`.toUpperCase();
            return `${prefix}-${token}`;
          };'''
          new_id = "\n".join(line[10:] if line.startswith("          ") else line for line in new_id.splitlines())
          if old_id in app:
              app = app.replace(old_id, new_id, 1)
          elif "globalThis.crypto?.randomUUID" not in app:
              raise SystemExit("Vanita makeId patch target was not found")

          if 'delta: "+6.2%"' in app:
              app = app.replace('delta: "+6.2%"', 'delta: "Live count"', 1)
          elif 'delta: "Live count"' not in app:
              raise SystemExit("Vanita inventory metric patch target was not found")

          old_chart = '''function renderChart() {
            const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
            const stockIn = [58,92,46,110,76,128,65], stockOut = [36,55,68,52,87,73,42];
            $("#stockChart").innerHTML = days.map((day, i) => `<div class="chart-day"><div class="bar-pair"><i class="bar in" style="height:${stockIn[i]}px"></i><i class="bar out" style="height:${stockOut[i]}px"></i></div><span>${day}</span></div>`).join("");
          }'''
          old_chart = "\n".join(line[10:] if line.startswith("          ") else line for line in old_chart.splitlines())
          new_chart = '''function renderChart() {
            const days = Array.from({ length: 7 }, (_, index) => {
              const date = new Date();
              date.setHours(0, 0, 0, 0);
              date.setDate(date.getDate() - (6 - index));
              return date;
            });
            const key = value => new Date(value).toLocaleDateString("en-CA");
            const movements = days.map(day => {
              const dayKey = key(day);
              const stockIn = state.invoices
                .filter(document => document.stockApplied !== false && Number(document.direction) === 1 && key(document.date) === dayKey)
                .reduce((sum, document) => sum + (document.lines || []).reduce((lineSum, line) => lineSum + (Number(line.qty) || 0), 0), 0);
              const supplierReturns = state.invoices
                .filter(document => document.stockApplied !== false && Number(document.direction) === -1 && key(document.date) === dayKey)
                .reduce((sum, document) => sum + (document.lines || []).reduce((lineSum, line) => lineSum + (Number(line.qty) || 0), 0), 0);
              const sold = state.sales
                .filter(sale => key(sale.date) === dayKey)
                .reduce((sum, sale) => sum + saleItemCounts(sale).product, 0);
              return { day, stockIn, stockOut: sold + supplierReturns };
            });
            const maximum = Math.max(1, ...movements.flatMap(item => [item.stockIn, item.stockOut]));
            $("#stockChart").innerHTML = movements.map(item => {
              const inHeight = item.stockIn ? Math.max(4, Math.round(item.stockIn / maximum * 160)) : 0;
              const outHeight = item.stockOut ? Math.max(4, Math.round(item.stockOut / maximum * 160)) : 0;
              const label = item.day.toLocaleDateString("en-GB", { weekday:"short" });
              return `<div class="chart-day"><div class="bar-pair"><i class="bar in" title="${item.stockIn} units in" style="height:${inHeight}px"></i><i class="bar out" title="${item.stockOut} units out" style="height:${outHeight}px"></i></div><span>${label}</span></div>`;
            }).join("");
          }'''
          new_chart = "\n".join(line[10:] if line.startswith("          ") else line for line in new_chart.splitlines())
          if old_chart in app:
              app = app.replace(old_chart, new_chart, 1)
          elif "const movements = days.map" not in app:
              raise SystemExit("Vanita stock chart patch target was not found")

          if 'window.addEventListener("vanita-cloud-conflict"' not in app:
              target = "  wireEvents();\n  try {"
              replacement = '''  wireEvents();
            window.addEventListener("vanita-cloud-conflict", () => {
              window.alert("Another staff member saved newer Vanita Stock changes. This page will reload the latest shared records; your conflicting unsynced edit will not overwrite them.");
              window.location.reload();
            }, { once:true });
            try {'''
              replacement = "\n".join(line[10:] if line.startswith("          ") else line for line in replacement.splitlines())
              if target not in app:
                  raise SystemExit("Vanita conflict listener patch target was not found")
              app = app.replace(target, replacement, 1)

          app_path.write_text(app)

          css_path = Path("projects/vanita-stock/styles.css")
          css = css_path.read_text()
          marker = "/* Cloud reliability states */"
          if marker not in css:
              css += '''

/* Cloud reliability states */
.cloud-status[data-tone="saving"] { color: var(--gold-light); background: var(--gold-faint); }
.cloud-status[data-tone="offline"] { color: #edbd72; background: var(--amber-bg); border-color: rgba(224, 166, 77, .24); }
.cloud-status[data-tone="error"] { color: #ef9585; background: var(--red-bg); border-color: rgba(220, 109, 85, .28); }
'''
              css_path.write_text(css)

          settings_path = Path("src/app/settings/page.tsx")
          settings = settings_path.read_text()
          if "Team data unavailable" not in settings:
              team_pattern = r'''function TeamPanel\(\{ mode, canManage \}: \{ mode: string; canManage: boolean \}\) \{.*?\n\}\n\nfunction BillingPanel'''
              team_replacement = '''function TeamPanel({ mode, canManage }: { mode: string; canManage: boolean }) {
                const [members, setMembers] = useState<Member[]>([]);
                const [loading, setLoading] = useState(true);
                const [inviting, setInviting] = useState(false);
                const [error, setError] = useState<string | null>(null);
                const load = useCallback(async () => {
                  setLoading(true);
                  setError(null);
                  if (mode !== "cloud") {
                    setMembers([
                      { user_id: "demo-owner", role: "owner", status: "active", email: "owner@business.com", profiles: { full_name: "Workspace Owner" } },
                      { user_id: "demo-manager", role: "manager", status: "active", email: "manager@business.com", profiles: { full_name: "Operations Manager" } },
                    ]);
                    setLoading(false);
                    return;
                  }
                  try {
                    const response = await fetch("/api/workspace/team", { cache: "no-store" });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok) throw new Error(result.error ?? "The team could not be loaded.");
                    setMembers(Array.isArray(result.members) ? result.members : []);
                  } catch (loadError) {
                    setMembers([]);
                    setError(loadError instanceof Error ? loadError.message : "The team could not be loaded.");
                  } finally {
                    setLoading(false);
                  }
                }, [mode]);
                useEffect(() => { const timer = window.setTimeout(() => void load(), 0); return () => window.clearTimeout(timer); }, [load]);
                async function invite(event: FormEvent<HTMLFormElement>) {
                  event.preventDefault();
                  if (mode !== "cloud") { setError("Connect a cloud workspace to send real invitations."); return; }
                  setInviting(true);
                  setError(null);
                  const formElement = event.currentTarget;
                  const form = new FormData(formElement);
                  try {
                    const response = await fetch("/api/workspace/team", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email: form.get("email"), role: form.get("role") }) });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok) throw new Error(result.error ?? "The invitation could not be sent.");
                    formElement.reset();
                    await load();
                  } catch (inviteError) {
                    setError(inviteError instanceof Error ? inviteError.message : "The invitation could not be sent.");
                  } finally { setInviting(false); }
                }
                return (
                  <div className="settings-layout">
                    <Card className="settings-card">
                      <SectionHeading title="People & permissions" description="Roles are enforced by database policies, not just interface visibility." />
                      {error ? <div className="review-callout" role="alert"><ShieldCheck size={18} /><div><strong>Team data unavailable</strong><p>{error}</p><Button type="button" variant="quiet" onClick={() => void load()}>Try again</Button></div></div> : null}
                      {loading ? <Loader2 className="spin" /> : !error && members.length > 0 ? <div className="team-list">{members.map((member) => <div key={member.user_id}><span className="profile-avatar">{(member.profiles?.full_name || member.email).slice(0, 2).toUpperCase()}</span><span><strong>{member.profiles?.full_name || member.email}</strong><small>{member.email} · {member.status}</small></span><span className={`role-badge ${member.role}`}>{member.role === "staff" ? "Employee" : member.role}</span></div>)}</div> : !error ? <p className="muted">No active team members were returned for this workspace.</p> : null}
                    </Card>
                    <Card className="settings-card">
                      <SectionHeading title="Invite team member" description="Owners and Managers can add people to this workspace." />
                      <form onSubmit={invite}><div className="field"><label>Work email</label><input name="email" type="email" required disabled={!canManage || inviting} /></div><div className="field" style={{ marginTop: 14 }}><label>Role</label><select name="role" disabled={!canManage || inviting}><option value="staff">Employee · daily work</option><option value="manager">Manager · people and settings</option><option value="owner">Owner · full business control</option></select></div><Button type="submit" disabled={!canManage || inviting} style={{ marginTop: 18 }}><Plus size={16} /> {inviting ? "Sending…" : "Send invitation"}</Button></form>
                    </Card>
                  </div>
                );
              }

              function BillingPanel'''
              team_replacement = "\n".join(line[14:] if line.startswith("              ") else line for line in team_replacement.splitlines())
              settings, count = re.subn(team_pattern, team_replacement, settings, count=1, flags=re.S)
              if count != 1: raise SystemExit("Settings TeamPanel patch target was not found")

          if "See workspace agreement" not in settings:
              billing_pattern = r'''function BillingPanel\(\{ mode \}: \{ mode: string \}\) \{.*?\n\}\s*$'''
              billing_replacement = '''function BillingPanel({ mode }: { mode: string }) {
                const [loading, setLoading] = useState(false);
                const [error, setError] = useState<string | null>(null);
                async function portal() {
                  if (mode !== "cloud") { setError("The billing portal becomes available after a client subscription is connected."); return; }
                  setLoading(true);
                  setError(null);
                  try {
                    const response = await fetch("/api/workspace/billing-portal", { method: "POST" });
                    const result = await response.json().catch(() => ({}));
                    if (!response.ok || typeof result.url !== "string") throw new Error(result.error ?? "The billing portal is unavailable.");
                    window.location.assign(result.url);
                  } catch (portalError) {
                    setError(portalError instanceof Error ? portalError.message : "The billing portal is unavailable.");
                  } finally { setLoading(false); }
                }
                return (
                  <div className="settings-layout">
                    <Card className="settings-card"><SectionHeading title="Plan & contract" description="Commercial terms are managed against the actual workspace agreement." /><div className="billing-plan"><p className="eyebrow">Workspace agreement</p><h2>{mode === "cloud" ? "Managed by BDB OS" : "Preview workspace"}</h2><p>{mode === "cloud" ? "Open the secure billing portal for verified payment and invoice information. Module or contract changes require an agreed quote before they take effect." : "No subscription or contract is connected to this browser preview."}</p><div><span><strong>Plan</strong><small>{mode === "cloud" ? "See workspace agreement" : "Not connected"}</small></span><span><strong>Billing cycle</strong><small>{mode === "cloud" ? "See secure portal" : "Not connected"}</small></span><span><strong>Status</strong><small>{mode === "cloud" ? "Workspace managed" : "Preview only"}</small></span></div></div></Card>
                    <Card className="settings-note"><CreditCard size={22} /><h2 style={{ marginTop: 10 }}>Billing support</h2><p>Payment methods and issued billing documents are handled through the secure Stripe customer portal. This screen does not invent contract terms when the workspace API has not returned them.</p>{error ? <p role="alert" style={{ color: "var(--red)", marginTop: 12 }}>{error}</p> : null}<Button variant="secondary" style={{ marginTop: 18 }} onClick={() => void portal()} disabled={loading}>{loading ? "Opening…" : "Open billing portal"}</Button></Card>
                  </div>
                );
              }
              '''
              billing_replacement = "\n".join(line[14:] if line.startswith("              ") else line for line in billing_replacement.splitlines())
              settings, count = re.subn(billing_pattern, billing_replacement, settings, count=1, flags=re.S)
              if count != 1: raise SystemExit("Settings BillingPanel patch target was not found")

          settings_path.write_text(settings)

          ci_path = Path(".github/workflows/v1-ci.yml")
          ci = ci_path.read_text()
          marker = "\n  launch-hardening-patch:\n"
          if marker not in ci: raise SystemExit("Temporary CI job marker was not found")
          ci_path.write_text(ci.split(marker, 1)[0].rstrip() + "\n")
          PY

          node --check projects/vanita-stock/app.js
          node --check projects/vanita-stock/cloud.js
          git config user.name "BDB OS Release Bot"
          git config user.email "actions@users.noreply.github.com"
          rm -f .github/workflows/apply-vanita-data-hardening.yml .github/workflows/apply-settings-reliability.yml docs/release/.trigger-vanita-hardening
          git add -A
          git commit -m "Complete launch source hardening"
          git push origin HEAD:qa/launch-readiness-hardening-v1
