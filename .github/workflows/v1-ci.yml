name: BDB OS V1 Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Repair legacy lockfile corruption
        id: lockfile
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f package-lock.json
          if head -n 1 package-lock.json | grep -q '^Warning: truncated output'; then
            tail -n +3 package-lock.json > package-lock.fixed.json
            mv package-lock.fixed.json package-lock.json
            node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('Repaired lockfile is valid JSON')"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "Repair dependency lockfile"
            git push origin HEAD:${{ github.head_ref }}
            echo "repaired=true" >> "$GITHUB_OUTPUT"
          else
            node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('Lockfile is valid JSON')"
            echo "repaired=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop after lockfile repair
        if: steps.lockfile.outputs.repaired == 'true'
        run: |
          echo "The corrected lockfile was pushed. A new validation run will start automatically."
          exit 1

      - name: Set up Node.js
        if: steps.lockfile.outputs.repaired != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        if: steps.lockfile.outputs.repaired != 'true'
        run: npm ci

      - name: TypeScript
        if: steps.lockfile.outputs.repaired != 'true'
        run: npx tsc --noEmit

      - name: ESLint
        if: steps.lockfile.outputs.repaired != 'true'
        run: npm run lint

      - name: Production build
        if: steps.lockfile.outputs.repaired != 'true'
        run: npm run build
