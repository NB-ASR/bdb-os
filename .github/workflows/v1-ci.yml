name: BDB OS V1 Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate repository and repair legacy lockfile locally
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f package-lock.json
          if head -n 1 package-lock.json | grep -q '^Warning: truncated output'; then
            tail -n +3 package-lock.json > package-lock.fixed.json
            mv package-lock.fixed.json package-lock.json
          fi
          node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('Lockfile is valid JSON for this validation run')"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
