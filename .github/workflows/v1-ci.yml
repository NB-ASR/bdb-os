name: BDB OS V1 Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate repository and repair legacy lockfile locally
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f package-lock.json
          node <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('package-lock.json', 'utf8');
          const start = source.indexOf('{');
          const end = source.lastIndexOf('}');
          if (start < 0 || end < start) throw new Error('package-lock.json does not contain a complete JSON object');
          const repaired = source.slice(start, end + 1);
          JSON.parse(repaired);
          fs.writeFileSync('package-lock.json', repaired + '\n');
          console.log('Lockfile is valid JSON for this validation run');
          NODE

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build
