name: Reconcile Quality Foundation

on:
  push:
    branches:
      - qa/launch-readiness-hardening-v1

permissions:
  contents: write

concurrency:
  group: reconcile-quality-foundation
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out launch-readiness branch
        uses: actions/checkout@v4
        with:
          ref: qa/launch-readiness-hardening-v1
          fetch-depth: 0

      - name: Merge Giovanni's Quality Foundation branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BDB OS Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin qa/security-reliability-foundation

          set +e
          git merge --no-ff --no-commit origin/qa/security-reliability-foundation
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U)"
          unexpected="$(printf '%s\n' "$conflicts" | sed '/^$/d' | grep -v '^next.config.ts$' || true)"

          if [ -n "$unexpected" ]; then
            echo "Unexpected merge conflicts:" >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi

          if printf '%s\n' "$conflicts" | grep -qx 'next.config.ts'; then
            cat > next.config.ts <<'EOF'
          import type { NextConfig } from "next";

          const production = process.env.NODE_ENV === "production";

          const contentSecurityPolicy = [
            "default-src 'self'",
            `script-src 'self' 'unsafe-inline'${production ? "" : " 'unsafe-eval'"} https://js.stripe.com`,
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com",
            "img-src 'self' data: blob: https://*.supabase.co",
            "font-src 'self' data: https://fonts.gstatic.com",
            "connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com",
            "frame-src 'self' https://js.stripe.com https://hooks.stripe.com",
            "worker-src 'self' blob:",
            "manifest-src 'self'",
            "object-src 'none'",
            "base-uri 'self'",
            "form-action 'self'",
            "frame-ancestors 'none'",
            ...(production ? ["upgrade-insecure-requests"] : []),
          ].join("; ");

          const securityHeaders = [
            { key: "Content-Security-Policy", value: contentSecurityPolicy },
            { key: "Referrer-Policy", value: "strict-origin-when-cross-origin" },
            { key: "X-Content-Type-Options", value: "nosniff" },
            { key: "X-Frame-Options", value: "DENY" },
            {
              key: "Permissions-Policy",
              value: "camera=(self), microphone=(), geolocation=(), payment=(self)",
            },
            { key: "Cross-Origin-Opener-Policy", value: "same-origin" },
            ...(production
              ? [{ key: "Strict-Transport-Security", value: "max-age=63072000; includeSubDomains; preload" }]
              : []),
          ];

          const nextConfig: NextConfig = {
            outputFileTracingIncludes: {
              "/vanita-stock-review/[[...asset]]": ["./projects/vanita-stock/**/*"],
            },
            async headers() {
              return [
                {
                  source: "/:path*",
                  headers: securityHeaders,
                },
              ];
            },
          };

          export default nextConfig;
          EOF
            sed -i 's/^          //' next.config.ts
            git add next.config.ts
          fi

          remaining="$(git diff --name-only --diff-filter=U)"
          if [ -n "$remaining" ]; then
            echo "Unresolved conflicts remain:" >&2
            printf '%s\n' "$remaining" >&2
            exit 1
          fi

          if [ "$merge_status" -ne 0 ] && git diff --quiet --cached; then
            echo "Merge failed without a resolvable staged result." >&2
            exit 1
          fi

          git rm .github/workflows/reconcile-quality-foundation.yml
          git commit -m "Merge Quality Foundation into launch readiness"
          git push origin HEAD:qa/launch-readiness-hardening-v1
