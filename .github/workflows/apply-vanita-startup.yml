name: Apply final Vanita startup hardening

on:
  push:
    branches:
      - qa/launch-readiness-hardening-v1

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: qa/launch-readiness-hardening-v1
          fetch-depth: 0
      - run: |
          npm --prefix projects/vanita-stock run harden
          npm --prefix projects/vanita-stock run check
      - run: |
          git config user.name "BDB OS Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/apply-vanita-startup.yml
          git add projects/vanita-stock/app.js
          git commit -m "Make Vanita cloud startup explicitly seed-safe"
          git push origin HEAD:qa/launch-readiness-hardening-v1
